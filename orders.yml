- name: setup orders service
  hosts: orders
  become: yes
  gather_facts: no
  tasks:
    - name: Install Java, Maven
      ansible.builtin.dnf:
        name:
          - java-21-openjdk
          - java-21-openjdk-devel
          - maven
          - unzip

    - name: copy orders service
      ansible.builtin.copy:
        src: orders.service
        dest: /etc/systemd/system/orders.service


    - name: create user
      ansible.builtin.user:
        name: appuser
        shell: /bin/false

    - name: create app directory
      ansible.builtin.file:
        path: /app
        owner: appuser
        group: appuser
        mode: "0770"
        state: directory

    - name: download & unzip code
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/orders.zip
        dest: /app
        remote_src: yes
    
    - name: build code
      ansible.builtin.shell: |
        mvn clean package -DskipTests
        cp target/orders.jar /app/orders.jar

    - name: restart oders service
      ansible.builtin.systemd_service:
        name: orders
        state: restarted
        daemon_reload: true
        enabled: yes

