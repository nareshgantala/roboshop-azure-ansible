---
# tasks file for user
- name: setup the code
  ansible.builtin.include_role: common

- name: install nodejs
  ansible.builtin.shell: |
    curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
    dnf install -y nodejs
    dnf install -y unzip


- name: install dependencies
  ansible.builtin.shell: npm install --production
  args:
    chdir: /app

- name: restart user service
  ansible.builtin.systemd_service:
    name: "{{ component_name }}"
    state: restarted
    enabled: yes
    daemon_reload: true
