---
# tasks file for "{{ component_name }}"
- name: install java, maven
  ansible.builtin.dnf:
    name:
      - java-21-openjdk
      - java-21-openjdk-devel
      - maven
      - mysql8.4
      - unzip

- name: copy service file
  ansible.builtin.copy:
    src: "{{ component_name }}.service"
    dest: /etc/systemd/system/{{ component_name }}.service

- name: create user
  ansible.builtin.user:
    name: appuser
    shell: /bin/false

- name: create app directory
  ansible.builtin.file:
    path: /app
    owner: appuser
    group: appuser
    mode: "0770"
    state: directory

- name: download code & unzip
  ansible.builtin.unarchive:
    src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/{{ component_name }}.zip
    dest: /app
    remote_src: yes

- name: setup datbase
  ansible.builtin.shell: |
    mysql -h 10.0.27.103 -u root -pRoboShop@1 < db/schema.sql
    mysql -h 10.0.27.103 -u root -pRoboShop@1 < db/app-user.sql
    mvn clean package -DskipTests
    cp target/{{ component_name }}.jar /app/{{ component_name }}.jar
  args:
    chdir: /app

- name: restart {{ component_name }} service
  ansible.builtin.systemd_service:
    name: "{{ component_name }}"
    state: restarted
    enabled: yes
    daemon_reload: true
