---
# tasks file for "{{ component_name }}"
- name: setup the code
  ansible.builtin.include_role: common

- name: install java, maven
  ansible.builtin.dnf:
    name:
      - java-21-openjdk
      - java-21-openjdk-devel
      - maven
      - mysql8.4
      - unzip

- name: setup datbase
  ansible.builtin.shell: |
    mysql -h 10.0.27.103 -u root -pRoboShop@1 < db/schema.sql
    mysql -h 10.0.27.103 -u root -pRoboShop@1 < db/app-user.sql
    mvn clean package -DskipTests
    cp target/{{ component_name }}.jar /app/{{ component_name }}.jar
  args:
    chdir: /app

- name: restart {{ component_name }} service
  ansible.builtin.systemd_service:
    name: "{{ component_name }}"
    state: restarted
    enabled: yes
    daemon_reload: true
