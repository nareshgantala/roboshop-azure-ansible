---
# tasks file for cart
- name: Install Java, Maven
  ansible.builtin.dnf:
    name:
      - java-21-openjdk
      - java-21-openjdk-devel
      - maven
      - unzip

- name: copy {{ component_name }} service
  ansible.builtin.copy:
    src: "{{ component_name }}.service"
    dest: /etc/systemd/system/{{ component_name }}.service

- name: create user
  ansible.builtin.user:
    name: appuser
    shell: /bin/false

- name: create app directory
  ansible.builtin.file:
    path: /app
    owner: appuser
    group: appuser
    mode: "0770"
    state: directory

- name: download & unzip code
  ansible.builtin.unarchive:
    src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/{{ component_name }}.zip
    dest: /app
    remote_src: yes

- name: build code
  ansible.builtin.shell: |
    mvn clean package -DskipTests
    cp target/{{ component_name }}.jar /app/{{ component_name }}.jar
  args:
    chdir: /app

- name: restart oders service
  ansible.builtin.systemd_service:
    name: "{{ component_name }}"
    state: restarted
    daemon_reload: true
    enabled: yes
