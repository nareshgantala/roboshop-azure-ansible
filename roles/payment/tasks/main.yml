---
# tasks file for payment
- name: install python
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
      - unzip

- name: copy payment service file
  ansible.builtin.copy:
    src: payment.service
    dest: /etc/systemd/system/payment.service

- name: create user
  ansible.builtin.user:
    name: appuser
    shell: /bin/false

- name: create app folder
  ansible.builtin.file:
    path: /app
    owner: appuser
    group: appuser
    mode: "0770"
    state: directory

- name: download and unzip code
  ansible.builtin.unarchive:
    src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/payment.zip
    dest: /app
    remote_src: yes
- name: download dependencies
  ansible.builtin.shell: pip3 install -r requirements.txt
  args:
    chdir: /app

- name: restart payment service
  ansible.builtin.systemd_service:
    name: payment
    enabled: yes
    daemon_reload: true
    state: restarted
