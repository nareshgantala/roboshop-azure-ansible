---

- name: Install Ansible MySQL Collection
  ansible.builtin.shell: ansible-galaxy collection install community.mysql

- name: Create swap file in /var (Required for 1GB RAM)
  ansible.builtin.shell: |
    # Remove any failed/partial files from previous attempts
    swapoff /swapfile || true
    rm -f /swapfile
    rm -f /var/swapfile
    
    # Create 1GB swap in the partition with space (/var)
    fallocate -l 1G /var/swapfile
    chmod 600 /var/swapfile
    mkswap /var/swapfile
    swapon /var/swapfile
  args:
    creates: /var/swapfile
    
# tasks file for mysql
- name: install mysql server
  ansible.builtin.dnf:
    name: mysql8.4-server
    state: present

- name: Restart mysqld service
  ansible.builtin.systemd_service:
    state: restarted
    enabled: yes
    daemon_reload: true
    name: mysqld


- name: Allow root login from any host
  # Use the full name and correct parameters
  community.mysql.mysql_user:
    name: root
    host: "%"
    password: "RoboShop@1"
    priv: "*.*:ALL,GRANT"
    state: present
    login_user: root
    login_password: "RoboShop@1"
    check_implicit_admin: yes
    login_unix_socket: /var/lib/mysql/mysql.sock