---
# tasks file for catalogue
- name: setup pre-req for catalogue
  ansible.builtin.include_role: 
    name: common
    tasks_from: main

# tasks file for catalogue
- name: setup pre-req for catalogue
  ansible.builtin.include_role: 
    name: common
    tasks_from: golang
    
- name: Wait for MySQL to be ready
  ansible.builtin.wait_for:
    host: "mysql-{{ env }}.naresh-training.online"
    port: 3306
    state: started
    delay: 10
    timeout: 300


- name: Load schema
  ansible.builtin.shell: mysql -h mysql-{{ env }}.naresh-training.online -u root -pRoboShop@1 < /app/db/schema.sql
  args:
    chdir: /app

- name: Create catalogue DB user
  ansible.builtin.shell: mysql -h mysql-{{ env }}.naresh-training.online -u root -pRoboShop@1 < /app/db/app-user.sql
  args:
    chdir: /app

- name: Load master data
  ansible.builtin.shell: mysql -h mysql-{{ env }}.naresh-training.online -u root -pRoboShop@1 catalogue < /app/db/master-data.sql
  args:
    chdir: /app

- name: build go application
  ansible.builtin.shell: |
    go mod tidy
    CGO_ENABLED=0 go build -o /app/{{ component_name }} .
  args:
    chdir: /app

- name: setup the code
  ansible.builtin.include_role: 
    name: common
    tasks_from: systemd
