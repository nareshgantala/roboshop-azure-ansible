- name: setup valkey server
  hosts: valkey
  become: yes
  gather_facts: no
  tasks:
    - name: install valkey
      ansible.builtin.dnf:
        name: valkey

    - name: update bind IP
      ansible.builtin.shell: |
        sed -i "s/bind 127.0.0.1/bind 0.0.0.0/" /etc/valkey/valkey.conf
        sed -i "s/protected-mode yes/protected-mode no/" /etc/valkey/valkey.conf
    
    - name: restart valkey
      ansible.builtin.systemd_service:
        name: valkey
        state: restarted
        enabled: yes
        daemon_reload: true