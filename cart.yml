- name: setup cart service
  hosts: cart
  become: yes
  gather_facts: no
  tasks:
    - name: install nodejs
      ansible.builtin.shell: |
        curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
        dnf install -y nodejs
        dnf install -y unzip

    - name: copy cart service file
      ansible.builtin.copy:
        src: cart.service
        dest: /etc/systemd/system/cart.service

    - name: create user
      ansible.builtin.user:
        name: appuser
        shell: /bin/false

    - name: create app directory
      ansible.builtin.file: 
        path: /app
        owner: appuser
        group: appuser
        mode: "0770"
        state: directory

    - name: download & unzip code
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/cart.zip
        dest: /app
        remote_src: yes

    - name: install dependencies
      ansible.builtin.shell: npm install --production
      args:
        chdir: /app
    
    - name: restart cart service
      ansible.builtin.systemd_service:
        name: cart
        daemon_reload: true
        enabled: yes
        state: restarted



    